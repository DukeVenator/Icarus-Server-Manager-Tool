name: dotnet-ci

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore IcarusServerManager.sln

      - name: Build
        run: dotnet build IcarusServerManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test IcarusServerManager.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory "${{ github.workspace }}/TestResults"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dotnet-ci-${{ github.run_id }}
          path: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          verbose: true

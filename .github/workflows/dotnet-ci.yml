name: dotnet-ci

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore IcarusServerManager.sln

      - name: Build
        run: dotnet build IcarusServerManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test IcarusServerManager.sln --configuration Release --no-build --verbosity normal
